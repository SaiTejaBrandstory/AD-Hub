# Render Blueprint — AdHub
# Use: Dashboard → New → Blueprint → connect SaiTejaBrandstory/AD-Hub
# Or set the same fields manually on each service.

services:
  - type: web
    name: adhub-api
    runtime: python
    # rootDir empty = use repo-root requirements.txt + start.sh
    buildCommand: pip install -r requirements.txt
    startCommand: chmod +x start.sh && ./start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DB_NAME
        value: adhub
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: adhub-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false
